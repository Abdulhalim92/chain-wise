syntax = "proto3";

package accounting;

option go_package = "chainwise/contracts/gen/accounting";

// AccountingService — закупки, проводки склад→филиал, подписка на order.delivered.
service AccountingService {
  rpc RegisterPurchase(RegisterPurchaseRequest) returns (RegisterPurchaseResponse);
  rpc GetPurchase(GetPurchaseRequest) returns (GetPurchaseResponse);
}

message PurchaseItem {
  string product_id = 1;
  int32 quantity = 2;
  int64 price_cents = 3;
}

message Purchase {
  string id = 1;
  string supplier_id = 2;
  string document_ref = 3;
  int64 total_cents = 4;
  repeated PurchaseItem items = 5;
  int64 created_at_unix = 6;
}

message RegisterPurchaseRequest {
  string supplier_id = 1;
  string document_ref = 2;
  repeated PurchaseItem items = 3;
}

message RegisterPurchaseResponse {
  Purchase purchase = 1;
}

message GetPurchaseRequest {
  string id = 1;
}

message GetPurchaseResponse {
  Purchase purchase = 1;
}
